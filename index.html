<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kairós</title>

    <!-- PWA configuration -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#002a45">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <h2>Kair<span>ós</span></h2>
            </div>

            <div class="stats-card">
                <h3>Horas Extras</h3>
                <p class="stats-subtitle">Total do Mês Atual</p>
                <div class="stats-value" id="monthly-overtime">0h</div>
            </div>

            <div class="info-card">
                <h3>Como Funciona</h3>
                <p>Insira a data do seu primeiro plantão. Os ciclos de <strong>24/72</strong> (1 dia vermelho, 3 dias
                    verdes) serão calculados automaticamente a partir desta data.</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <div class="month-navigation">
                    <button id="prev-month" class="nav-btn">&larr;</button>
                    <h1 id="current-month-display">Mês Ano</h1>
                    <button id="next-month" class="nav-btn">&rarr;</button>
                </div>

                <div class="shift-setup">
                    <label for="shift-start-date">Início do Plantão Base:</label>
                    <input type="date" id="shift-start-date" class="modern-input">
                </div>
            </header>

            <div class="calendar-wrapper">
                <div class="weekdays">
                    <div>Dom</div>
                    <div>Seg</div>
                    <div>Ter</div>
                    <div>Qua</div>
                    <div>Qui</div>
                    <div>Sex</div>
                    <div>Sáb</div>
                </div>
                <div class="calendar-grid" id="calendar-grid">
                    <!-- Days will be generated by JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Form -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <button class="close-btn" id="close-modal">&times;</button>
            <h2 id="modal-date-title">Registro - Data</h2>

            <div class="form-group">
                <label for="overtime-hours">Horas Extras (h)</label>
                <input type="number" id="overtime-hours" class="modern-input" min="0" step="1" placeholder="Ex: 4">
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" id="training-check">
                <label for="training-check">Dia de Formação</label>
            </div>

            <div class="form-group">
                <label for="shift-override">Status do Plantão</label>
                <select id="shift-override" class="modern-input">
                    <option value="none">Padrão da Escala</option>
                    <option value="off">Tornar Folga (Troca)</option>
                    <option value="shift">Tornar Plantão (A Pagar)</option>
                </select>
            </div>

            <div class="modal-actions">
                <button id="save-btn" class="btn primary-btn">Salvar</button>
                <button id="remove-btn" class="btn danger-btn">Limpar Dia</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful');
                    }, err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
</body>

</html>
